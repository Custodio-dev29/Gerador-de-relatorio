<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.11.338/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.11.338/pdf.worker.min.js"></script>
    <title>Lista de Serviços - Controle de Manutenção</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 Histórico de relatórios</h1>
        </div>

        <div class="content">
            <div class="service-controls">
                <div class="form-group">
                    <label for="filterPriority">Filtrar por Prioridade</label>
                    <select id="filterPriority">
                        <option value="todos">Todas</option>
                        <option value="urgente">Urgente</option>
                        <option value="media">Média</option>
                        <option value="baixa">Baixa</option>
                        <option value="">Serviço executado</option>
                    </select>
                </div>
            </div>
            <div class="button-group">
                <a href="index.html" class="btn-back">← Voltar </a>
                <button class="btn-export">↓ Exportar PDF</button>
                <button class="btn-import">↑ Importar PDF</button>
                <button class="btn-delete-all">🗑️ Excluir</button>
                <input type="file" id="pdfInput" accept=".pdf" style="display: none;">
            </div>
            <div class="services-list">
                <div id="servicosList">
                    <!-- O conteúdo será gerado pelo services.js -->
                </div>
            </div>
        </div>

        <div class="footer">
            <p>Custodio-dev29 © 2025</p>
        </div>
    </div>

    <!-- Modal de Visualização de Imagem -->
    <div id="imageModal" class="modal">
        <span class="close-modal">&times;</span>
        <img class="modal-content" id="modalImage" alt="Visualização da imagem ampliada" title="Visualização da imagem">
    </div>

    <script src="services.js"></script>
</body>
</html>
